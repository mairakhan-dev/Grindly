            resizeCanvas() {
                const container = this.canvas.parentElement;
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
            }

            loadImage(src) {
                const img = new Image();
                img.onload = () => { this.loadedImages++; if(this.loadedImages===this.totalImages) this.startGame(); };
                img.onerror = () => {
                    this.loadedImages++;
                    const canvas = document.createElement('canvas'); canvas.width=100; canvas.height=120;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = src.includes('kenji')||src.includes('8iF')?'#ef4444':'#ff69b4';
                    ctx.fillRect(20,20,60,80);
                    ctx.fillStyle='#ffffff'; ctx.font='bold 40px Arial';
                    ctx.fillText(src.includes('kenji')||src.includes('8iF')?'⚔️':'🌸', 35, 70);
                    const fallback = new Image(); fallback.src = canvas.toDataURL();
                    if(src.includes('kenji')||src.includes('8iF')) this.images.kenji[src.split('_')[0]?.split('/').pop()?.split('.')[0]||'idle'] = fallback;
                    else this.images.sakura[src.split('_')[0]?.split('/').pop()?.split('.')[0]||'idle'] = fallback;
                    if(this.loadedImages===this.totalImages) this.startGame();
                };
                img.src = src;
                return img;
            }

            checkImagesLoaded() { setTimeout(()=>{ if(this.loadedImages<this.totalImages) this.startGame(); },2000); }

            loadCharacterAssignments() {
                if (!this.battleRef) return;
                this.battleRef.child('characters').on('value', (snap) => {
                    const chars = snap.val() || {};
                    let both = true;
                    
                    if (chars.player1 === 'kenji') { 
                        this.players[0].id='kenji'; 
                        this.players[0].images=this.images.kenji;
                        this.players[0].characterName = 'kenji';
                    }
                    else if (chars.player1 === 'sakura') { 
                        this.players[0].id='sakura'; 
                        this.players[0].images=this.images.sakura;
                        this.players[0].characterName = 'sakura';
                    }
                    else both = false;
                    
                    if (chars.player2 === 'kenji') { 
                        this.players[1].id='kenji'; 
                        this.players[1].images=this.images.kenji;
                        this.players[1].characterName = 'kenji';
                    }
                    else if (chars.player2 === 'sakura') { 
                        this.players[1].id='sakura'; 
                        this.players[1].images=this.images.sakura;
                        this.players[1].characterName = 'sakura';
                    }
                    else both = false;
                    
                    if (both) {
                        if (this.playerRole==='player1') {
                            if(this.players[0].id==='kenji') { 
                                document.getElementById('p1Name').textContent='KENJI (YOU)'; 
                                document.getElementById('p2Name').textContent=this.players[1].id==='kenji'?'KENJI':'SAKURA'; 
                            }
                            else { 
                                document.getElementById('p1Name').textContent='SAKURA (YOU)'; 
                                document.getElementById('p2Name').textContent=this.players[1].id==='kenji'?'KENJI':'SAKURA'; 
                            }
                        } else {
                            if(this.players[1].id==='kenji') { 
                                document.getElementById('p2Name').textContent='KENJI (YOU)'; 
                                document.getElementById('p1Name').textContent=this.players[0].id==='kenji'?'KENJI':'SAKURA'; 
                            }
                            else { 
                                document.getElementById('p2Name').textContent='SAKURA (YOU)'; 
                                document.getElementById('p1Name').textContent=this.players[0].id==='kenji'?'KENJI':'SAKURA'; 
                            }
                        }
                        
                        // Initialize health in Firebase
                        this.battleRef.child('player1/health').set(100);
                        this.battleRef.child('player2/health').set(100);
                        this.battleRef.child('player1/mana').set(100);
                        this.battleRef.child('player2/mana').set(100);
                    } else {
                        if(!chars.player1||!chars.player2) this.showBattleMessage('⏳ Waiting for opponent...','#fbbf24');
                    }
                });
            }

            setupKeyboardControls() {
                document.addEventListener('keydown', (e)=>{
                    if(this.gameOver) return;
                    const k=e.key.toLowerCase();
                    if(k==='a'||k==='arrowleft'){ e.preventDefault(); this.buttonStates.left=true; }
                    if(k==='d'||k==='arrowright'){ e.preventDefault(); this.buttonStates.right=true; }
                    if(k==='j'){ e.preventDefault(); this.performAttack('punch'); }
                    if(k==='k'){ e.preventDefault(); this.performAttack('kick'); }
                    if(k==='l'){ e.preventDefault(); this.buttonStates.block=true; }
                    if(k==='u'){ e.preventDefault(); this.useUltimate(); }
                    if(k==='r' && this.gameOver) restartGame();
                });
                document.addEventListener('keyup', (e)=>{
                    const k=e.key.toLowerCase();
                    if(k==='a'||k==='arrowleft') this.buttonStates.left=false;
                    if(k==='d'||k==='arrowright') this.buttonStates.right=false;
                    if(k==='l') this.buttonStates.block=false;
                });
            }

            setupButtonListeners() { }

            press(action) {
                if(this.gameOver) return;
                const my=this.players.find(p=>p.controlledBy===this.playerRole);
                if(!my) return;
                switch(action){
                    case'left': this.buttonStates.left=true; break;
                    case'right': this.buttonStates.right=true; break;
                    case'punch': this.performAttack('punch'); break;
                    case'kick': this.performAttack('kick'); break;
                    case'block': this.buttonStates.block=true; break;
                    case'ultimate': this.useUltimate(); break;
                }
            }
            release(action) {
                if(action==='left') this.buttonStates.left=false;
                if(action==='right') this.buttonStates.right=false;
                if(action==='block') this.buttonStates.block=false;
            }

            useUltimate() {
                const my=this.players.find(p=>p.controlledBy===this.playerRole);
                const opp=this.players.find(p=>p.controlledBy!==this.playerRole);
                if(!my||!opp||this.gameOver) return;
                if(!this.rageMode){ this.showBattleMessage('❌ NEED RAGE MODE!','#ff0000'); return; }
                
                // Hit stop effect
                this.hitStop = 10;
                this.flashWhite = 5;
                
                // Update opponent's health in Firebase
                if(this.battleRef){
                    const hpPath = opp.id==='kenji'?'player1/health':'player2/health';
                    this.battleRef.child(hpPath).set(0);
                }
                
                // Show damage number
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width/1200;
                const scaleY = this.canvas.height/700;
                const scale = Math.min(scaleX, scaleY);
                const offsetX = (this.canvas.width-1200*scale)/2;
                const offsetY = (this.canvas.height-700*scale)/2;
                const screenX = rect.left + offsetX + opp.x * scale;
                const screenY = rect.top + offsetY + (opp.y - 60) * scale;
                showDamageNumber(screenX, screenY, 100, true);
                
                this.showBattleMessage('💀 ULTIMATE!','#ff0000'); 
                playSound('ultimate',0.8);
                
                // Massive blood explosion
                for(let i=0;i<100;i++) {
                    this.bloodParticles.push({ 
                        x:opp.x, 
                        y:opp.y-50, 
                        vx:(Math.random()-0.5)*40, 
                        vy:(Math.random()-0.5)*40-20, 
                        life:2, 
                        size:5+Math.random()*15, 
                        color:'#8B0000' 
                    });
                }
                
                // Shockwave
                this.shockwaves.push({ x:opp.x, y:opp.y-50, radius:30, life:1 });
            }

            startGame() {
                document.getElementById('gameCanvas').style.display='block';
                this.createSpecialMovesUI();
                this.startPositionSync();
                this.listenForUpdates();
                this.gameLoop();
                playSound('select');
            }

            startPositionSync() {
                if(positionUpdateInterval) clearInterval(positionUpdateInterval);
                positionUpdateInterval = setInterval(()=>{
                    if(this.gameOver||!this.battleRef) return;
                    const my=this.players.find(p=>p.controlledBy===this.playerRole);
                    if(!my||my.hitLocked||!my.characterName) return;
                    
                    const posData = {};
                    if (this.playerRole === 'player1') {
                        posData['player1'] = { x: my.x };
                    } else {
                        posData['player2'] = { x: my.x };
                    }
                    this.battleRef.child('positions').update(posData).catch(()=>{});
                }, 50);
            }

            listenForUpdates() {
                if(!this.battleRef) return;
                
                // Listen for ALL health changes - Firebase is the source of truth
                this.battleRef.child('player1/health').on('value',(s)=>{
                    const h=s.val(); 
                    if(h!==null) {
                        const oldHealth = this.players[0].health;
                        this.players[0].health = h;
                        document.getElementById('p1HealthFill').style.width=h+'%'; 
                        
                        // If health decreased, show damage effect
                        if (oldHealth > h && this.playerRole !== 'player1') {
                            this.flashWhite = 3;
                            this.shakeIntensity = 15;
                            
                            // Show damage number
                            const damage = oldHealth - h;
                            const rect = this.canvas.getBoundingClientRect();
                            const scaleX = this.canvas.width/1200;
                            const scaleY = this.canvas.height/700;
                            const scale = Math.min(scaleX, scaleY);
                            const offsetX = (this.canvas.width-1200*scale)/2;
                            const offsetY = (this.canvas.height-700*scale)/2;
                            const screenX = rect.left + offsetX + this.players[0].x * scale;
                            const screenY = rect.top + offsetY + (this.players[0].y - 60) * scale;
                            showDamageNumber(screenX, screenY, Math.round(damage));
                        }
                        
                        this.checkGameOver(); 
                    }
                });
                
                this.battleRef.child('player2/health').on('value',(s)=>{
                    const h=s.val(); 
                    if(h!==null) {
                        const oldHealth = this.players[1].health;
                        this.players[1].health = h;
                        document.getElementById('p2HealthFill').style.width=h+'%'; 
                        
                        // If health decreased, show damage effect
                        if (oldHealth > h && this.playerRole !== 'player2') {
                            this.flashWhite = 3;
                            this.shakeIntensity = 15;
                            
                            // Show damage number
                            const damage = oldHealth - h;
                            const rect = this.canvas.getBoundingClientRect();
                            const scaleX = this.canvas.width/1200;
                            const scaleY = this.canvas.height/700;
                            const scale = Math.min(scaleX, scaleY);
                            const offsetX = (this.canvas.width-1200*scale)/2;
                            const offsetY = (this.canvas.height-700*scale)/2;
                            const screenX = rect.left + offsetX + this.players[1].x * scale;
                            const screenY = rect.top + offsetY + (this.players[1].y - 60) * scale;
                            showDamageNumber(screenX, screenY, Math.round(damage));
                        }
                        
                        this.checkGameOver(); 
                    }
                });
                
                // Listen for mana changes
                this.battleRef.child('player1/mana').on('value',(s)=>{
                    const m=s.val(); 
                    if(m!==null) {
                        this.players[0].special = m;
                        document.getElementById('p1SpecialFill').style.width=m+'%'; 
                    }
                });
                
                this.battleRef.child('player2/mana').on('value',(s)=>{
                    const m=s.val(); 
                    if(m!==null) {
                        this.players[1].special = m;
                        document.getElementById('p2SpecialFill').style.width=m+'%'; 
                    }
                });
                
                // Position updates
                this.battleRef.child('positions').on('value',(s)=>{
                    const pos = s.val();
                    if(!pos || this.gameOver) return;
                    
                    if (this.playerRole === 'player1') {
                        if (pos.player2 && pos.player2.x !== undefined && this.players[1]) {
                            this.players[1].x = Math.max(100, Math.min(1100, pos.player2.x));
                        }
                    } else if (this.playerRole === 'player2') {
                        if (pos.player1 && pos.player1.x !== undefined && this.players[0]) {
                            this.players[0].x = Math.max(100, Math.min(1100, pos.player1.x));
                        }
                    }
                });
            }

            createSpecialMovesUI() {
                const container = document.getElementById('specialMoves'); 
                if(!container) return;
                
                container.innerHTML = '';
                
                const special = this.myMoves.filter(m => m.id !== 'punch' && m.id !== 'kick');
                
                if(special.length === 0) { 
                    container.innerHTML = '<div style="color:#fbbf24; text-align:center; padding:10px; font-size:14px; width:100%; font-family: \'Press Start 2P\', cursive;">⚡ NO SPECIAL MOVES</div>'; 
                    return; 
                }
                
                special.forEach(move => {
                    const btn = document.createElement('button');
                    btn.className = `special-move-btn ${move.rarity || 'common'}`;
                    btn.innerHTML = `<span class="icon">${move.icon}</span><span>${move.name}</span><span class="cost">${move.manaCost}</span>`;
                    
                    btn.onmousedown = (e) => { 
                        e.preventDefault(); 
                        this.useSpecialMove(move); 
                    };
                    btn.ontouchstart = (e) => { 
                        e.preventDefault(); 
                        this.useSpecialMove(move); 
                    };
                    
                    container.appendChild(btn);
                });
            }
            
            useSpecialMove(move) {
                const my=this.players.find(p=>p.controlledBy===this.playerRole);
                const opp=this.players.find(p=>p.controlledBy!==this.playerRole);
                if(!my||!opp||this.gameOver) return;
                if(my.hitLocked||my.state==='hurt'||my.attackTimer>0){ this.showBattleMessage('❌ CANNOT ACT!','#ef4444'); return; }
                if(Math.abs(my.x-opp.x)>250){ this.showBattleMessage('❌ TOO FAR!','#ef4444'); return; }
                if(my.special < move.manaCost){ this.showBattleMessage(`❌ NEED ${move.manaCost} MP`,'#ef4444'); return; }
                
                // Deduct mana
                my.special -= move.manaCost;
                if(this.battleRef){
                    const mpPath = my.id==='kenji'?'player1/mana':'player2/mana';
                    this.battleRef.child(mpPath).set(my.special);
                }
                
                if(move.heal){
                    // HEALING MOVE - update self health in Firebase
                    const newHealth = Math.min(100, my.health+move.heal);
                    if(this.battleRef){
                        const hpPath = my.id==='kenji'?'player1/health':'player2/health';
                        this.battleRef.child(hpPath).set(newHealth);
                    }
                    
                    // Show heal number
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width/1200;
                    const scaleY = this.canvas.height/700;
                    const scale = Math.min(scaleX, scaleY);
                    const offsetX = (this.canvas.width-1200*scale)/2;
                    const offsetY = (this.canvas.height-700*scale)/2;
                    const screenX = rect.left + offsetX + my.x * scale;
                    const screenY = rect.top + offsetY + (my.y - 60) * scale;
                    showDamageNumber(screenX, screenY, move.heal, false, true);
                    
                    this.showBattleMessage(`💚 +${move.heal} HP`,'#10b981'); 
                    playSound('heal',0.5);
                    
                    // Heal particles
                    for(let i=0;i<20;i++) {
                        this.specialEffects.push({ 
                            x:my.x, 
                            y:my.y-50, 
                            vx:(Math.random()-0.5)*8, 
                            vy:(Math.random()-0.5)*8-5, 
                            life:1, 
                            color:'#10b981' 
                        });
                    }
                } else {
                    // ATTACK MOVE - calculate damage and update opponent's health in Firebase
                    const chainBonus = this.comboChain.multiplier;
                    const dmgBoost = this.rageMode?1.5:1;
                    const crit = Math.random()<0.2;
                    let finalDmg = Math.floor(move.damage * dmgBoost * chainBonus);
                    
                    // Hit stop effect
                    this.hitStop = 5;
                    
                    if(crit){ 
                        finalDmg+=Math.floor(move.damage*0.5); 
                        this.showBattleMessage(`✨ CRITICAL! ${finalDmg}`,'#ffd700'); 
                        playSound('critical',0.6); 
                        this.flashWhite = 5;
                        this.shakeIntensity = 40;
                    } else { 
                        this.showBattleMessage(`💥 -${finalDmg}`,'#ef4444'); 
                        playSound('hit',0.3);
                    }
                    
                    const newHealth = Math.max(0, opp.health - finalDmg);
                    
                    // Show damage number
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width/1200;
                    const scaleY = this.canvas.height/700;
                    const scale = Math.min(scaleX, scaleY);
                    const offsetX = (this.canvas.width-1200*scale)/2;
                    const offsetY = (this.canvas.height-700*scale)/2;
                    const screenX = rect.left + offsetX + opp.x * scale;
                    const screenY = rect.top + offsetY + (opp.y - 60) * scale;
                    showDamageNumber(screenX, screenY, finalDmg, crit);
                    
                    // Update opponent's health in Firebase
                    if(this.battleRef){
                        const hpPath = opp.id==='kenji'?'player1/health':'player2/health';
                        this.battleRef.child(hpPath).set(newHealth);
                    }
                    
                    opp.hitLocked=true; 
                    opp.state='hurt'; 
                    opp.stateTimer=15;
                    
                    // Knockback
                    opp.x += (my.facing>0?80:-80); 
                    opp.x = Math.max(100, Math.min(1100, opp.x));
                    
                    this.shakeIntensity = 35;
                    
                    // Blood particles
                    for(let i=0;i<(this.rageMode?40:20);i++) {
                        this.bloodParticles.push({ 
                            x:opp.x, 
                            y:opp.y-50, 
                            vx:(Math.random()-0.5)*15, 
                            vy:(Math.random()-0.5)*15-5, 
                            life:1.2, 
                            size:3+Math.random()*6, 
                            color:crit?'#8B0000':'#B22222' 
                        });
                    }
                    
                    // Shockwave
                    this.shockwaves.push({ x:opp.x, y:opp.y-50, radius:30, life:0.5 });
                    
                    // Gain rage from hitting
                    my.rage = Math.min(my.maxRage, my.rage + this.rageGainPerHit);
                    if(my.rage>=my.maxRage && !this.rageMode) this.activateRageMode();
                    
                    // Combo
                    this.comboChain.count++; 
                    this.comboChain.timer=this.comboChain.maxTimer; 
                    playSound('combo',0.2);
                }
                
                my.attackTimer=20; 
                my.state='punch'; 
                my.stateTimer=15;
                
                // Update rage UI
                document.getElementById('p1RageFill').style.width=this.players[0].rage+'%';
                document.getElementById('p2RageFill').style.width=this.players[1].rage+'%';
            }

            activateRageMode() {
                this.rageMode=true; this.rageTimer=this.maxRageTimer; 
                playSound('rage',0.7);
                document.getElementById('rageIndicator').style.display='block';
                document.querySelector('canvas').classList.add('rage-mode');
                this.showBattleMessage('⚡ RAGE MODE!','#ff0000'); 
                this.shakeIntensity=30;
                const my=this.players.find(p=>p.controlledBy===this.playerRole); 
                if(my) {
                    my.rage=0;
                }
            }

            updateRageMode() {
                if(this.rageMode){
                    this.rageTimer--;
                    document.getElementById('rageIndicator').innerHTML = `⚡ ${Math.ceil(this.rageTimer/60)}s ⚡`;
                    if(this.rageTimer<=0){ 
                        this.rageMode=false; 
                        document.getElementById('rageIndicator').style.display='none'; 
                        document.querySelector('canvas').classList.remove('rage-mode'); 
                        this.showBattleMessage('💤 RAGE EXPIRED','#888'); 
                    }
                }
            }

            updateComboChain() {
                if(this.comboChain.count>0){
                    this.comboChain.timer--;
                    let mult = 1;
                    if(this.comboChain.count>=10) mult=3.0;
                    else if(this.comboChain.count>=7) mult=2.5;
                    else if(this.comboChain.count>=5) mult=2.0;
                    else if(this.comboChain.count>=3) mult=1.5;
                    this.comboChain.multiplier = mult;
                    document.getElementById('comboIndicator').style.display='block';
                    document.getElementById('comboIndicator').innerHTML = `🔥 ${this.comboChain.count}x (${mult.toFixed(1)}x)`;
                    if(this.comboChain.timer<=0){ this.comboChain.count=0; this.comboChain.multiplier=1; document.getElementById('comboIndicator').style.display='none'; }
                } else document.getElementById('comboIndicator').style.display='none';
            }

            checkGameOver() {
                if(this.gameOver) return false;
                
                // Check if either player is defeated
                if(this.players[0].health <= 0 || this.players[1].health <= 0){
                    this.gameOver = true;
                    
                    // Hit stop
                    this.hitStop = 20;
                    
                    // Determine winner
                    const winner = this.players[0].health <= 0 ? 'player2' : 'player1';
                    const playerWon = (this.playerRole === winner);
                    
                    // Show victory/defeat message
                    document.getElementById('victoryText').textContent = playerWon ? 'VICTORY!' : 'DEFEAT!';
                    document.getElementById('gameOverlay').classList.add('show');
                    
                    // Calculate XP
                    const xp = playerWon ? 100 : 25;
                    document.getElementById('xpGained').textContent = `+${xp} XP`;
                    
                    // Play sound
                    playSound('ko',0.8);
                    
                    // Blood particles
                    for(let i=0;i<200;i++) {
                        this.bloodParticles.push({ 
                            x:this.players[0].x, 
                            y:this.players[0].y-50, 
                            vx:(Math.random()-0.5)*30, 
                            vy:(Math.random()-0.5)*30-20, 
                            life:2, 
                            size:4+Math.random()*15, 
                            color:'#8B0000' 
                        });
                    }
                    
                    // Clear position sync interval
                    if(positionUpdateInterval) clearInterval(positionUpdateInterval);
                    
                    return true;
                }
                return false;
            }

            showBattleMessage(msg,color) {
                const d=document.createElement('div'); d.className='battle-message'; d.style.color=color; d.textContent=msg;
                document.body.appendChild(d); setTimeout(()=>d.remove(),1500);
            }

            performAttack(type) {
                const now = Date.now();
                if (now - this.lastAttackTime < 200) return; // Attack cooldown
                this.lastAttackTime = now;
                
                const attacker = this.players.find(p=>p.controlledBy===this.playerRole);
                const defender = this.players.find(p=>p.controlledBy!==this.playerRole);
                if(!attacker||!defender) return;
                
                const dist = Math.abs(attacker.x - defender.x);
                if(dist < 200){
                    // Get damage from move database
                    const move = MOVE_DATABASE[type];
                    if(!move) return;
                    
                    const blocking = defender.isBlocking;
                    let finalDmg = Math.floor(move.damage * (this.rageMode?1.5:1) * this.comboChain.multiplier);
                    if(blocking) finalDmg = Math.floor(finalDmg*0.2);
                    
                    // Hit stop effect
                    this.hitStop = blocking ? 3 : 5;
                    
                    // Calculate new health for defender
                    const newHealth = Math.max(0, defender.health - finalDmg);
                    
                    // Update defender's health in Firebase
                    if(this.battleRef){
                        const hpPath = defender.id==='kenji'?'player1/health':'player2/health';
                        this.battleRef.child(hpPath).set(newHealth);
                    }
                    
                    defender.hitLocked=true; 
                    defender.state='hurt'; 
                    defender.stateTimer=15;
                    
                    attacker.state=type; 
                    attacker.stateTimer=15; 
                    attacker.attackTimer=20;
                    
                    // Show damage number
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width/1200;
                    const scaleY = this.canvas.height/700;
                    const scale = Math.min(scaleX, scaleY);
                    const offsetX = (this.canvas.width-1200*scale)/2;
                    const offsetY = (this.canvas.height-700*scale)/2;
                    const screenX = rect.left + offsetX + defender.x * scale;
                    const screenY = rect.top + offsetY + (defender.y - 60) * scale;
                    
                    if(!blocking){
                        // Show damage message
                        this.showBattleMessage(`💥 -${finalDmg}`,'#ef4444');
                        showDamageNumber(screenX, screenY, finalDmg);
                        
                        // Gain resources for successful hit
                        attacker.special = Math.min(attacker.maxSpecial, attacker.special+8);
                        if(this.battleRef){
                            const mpPath = attacker.id==='kenji'?'player1/mana':'player2/mana';
                            this.battleRef.child(mpPath).set(attacker.special);
                        }
                        
                        this.comboChain.count++; 
                        this.comboChain.timer=this.comboChain.maxTimer; 
                        
                        this.combo.count++; 
                        this.combo.timer=30;
                        
                        document.getElementById('comboIndicator').style.display='block';
                        document.getElementById('comboIndicator').innerHTML = `🔥 ${this.combo.count} HIT!`;
                        
                        if(this.combo.count%5===0){
                            playSound('critical',0.5);
                            this.shockwaves.push({ x:defender.x, y:defender.y-50, radius:30, life:1 });
                            attacker.rage = Math.min(attacker.maxRage, attacker.rage+40);
                            this.flashWhite = 3;
                        }
                        
                        // Blood particles
                        for(let i=0;i<(this.rageMode?20:10);i++) {
                            this.bloodParticles.push({ 
                                x:defender.x, 
                                y:defender.y-50, 
                                vx:(Math.random()-0.5)*12, 
                                vy:(Math.random()-0.5)*12-5, 
                                life:1, 
                                size:2+Math.random()*5, 
                                color:'#B22222' 
                            });
                        }
                        
                        // Shockwave
                        this.shockwaves.push({ x:defender.x, y:defender.y-50, radius:20, life:0.3 });
                        
                        attacker.rage = Math.min(attacker.maxRage, attacker.rage+this.rageGainPerHit);
                        if(attacker.rage>=attacker.maxRage && !this.rageMode) this.activateRageMode();
                        
                        // Play hit sound
                        playSound('hit',0.3);
                        
                    } else {
                        // Block effects
                        this.showBattleMessage('🛡️ BLOCKED!','#22c55e');
                        showDamageNumber(screenX, screenY, finalDmg, false, false, true);
                        
                        for(let i=0;i<15;i++) {
                            this.blockEffects.push({ 
                                x:defender.x, 
                                y:defender.y-50, 
                                vx:(Math.random()-0.5)*10, 
                                vy:(Math.random()-0.5)*10-5, 
                                life:0.8, 
                                color:'#22c55e' 
                            });
                        }
                        this.comboChain.count=0; 
                        this.comboChain.multiplier=1;
                        
                        // Play block sound
                        playSound('block',0.4);
                    }
                    
                    // Update rage UI
                    document.getElementById('p1RageFill').style.width=this.players[0].rage+'%';
                    document.getElementById('p2RageFill').style.width=this.players[1].rage+'%';
                }
            }

            update() {
                if(this.gameOver) return;
                
                // Hit stop
                if (this.hitStop > 0) {
                    this.hitStop--;
                    return;
                }
                
                this.frame++;
                this.updateRageMode();
                this.updateComboChain();
                
                // Flash white effect
                if (this.flashWhite > 0) {
                    this.flashWhite--;
                }
                
                if(this.shakeIntensity>0) this.shakeIntensity*=0.9;
                
                // Timer
                if(this.frame%60===0 && this.timer>0){ 
                    this.timer--; 
                    document.getElementById('timerDisplay').textContent=this.timer; 
                    if(this.timer<=10) playSound('warning',0.2);
                    
                    // Time's up - determine winner
                    if(this.timer<=0){
                        if(this.players[0].health > this.players[1].health) {
                            if(this.battleRef) this.battleRef.child('player2/health').set(0);
                        } else if(this.players[1].health > this.players[0].health) {
                            if(this.battleRef) this.battleRef.child('player1/health').set(0);
                        } else {
                            // Tie - random winner
                            if(Math.random()<0.5) {
                                if(this.battleRef) this.battleRef.child('player2/health').set(0);
                            } else {
                                if(this.battleRef) this.battleRef.child('player1/health').set(0);
                            }
                        }
                    }
                }
                
                // Update state timers
                this.players.forEach(p=>{ 
                    if(p.stateTimer>0 && --p.stateTimer<=0){ 
                        p.state='idle'; 
                        p.hitLocked=false; 
                    } 
                });
                
                this.players.forEach(p=>{ if(p.attackTimer>0) p.attackTimer--; });
                
                if(this.combo.timer>0 && --this.combo.timer<=0){ 
                    this.combo.count=0; 
                    document.getElementById('comboIndicator').style.display='none'; 
                }
                
                // Update particles
                this.bloodParticles = this.bloodParticles.filter(p=>p.life>0);
                this.bloodParticles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.01; });
                
                this.specialEffects = this.specialEffects.filter(e=>e.life>0);
                this.specialEffects.forEach(e=>{ e.x+=e.vx; e.y+=e.vy; e.life-=0.02; });
                
                this.blockEffects = this.blockEffects.filter(e=>e.life>0);
                this.blockEffects.forEach(e=>{ e.x+=e.vx; e.y+=e.vy; e.life-=0.02; });
                
                this.shockwaves = this.shockwaves.filter(s=>s.life>0);
                this.shockwaves.forEach(s=>{ s.radius+=5; s.life-=0.02; });
                
                // Update player movement
                const my=this.players.find(p=>p.controlledBy===this.playerRole);
                const opp=this.players.find(p=>p.controlledBy!==this.playerRole);
                if(my && opp) this.updatePlayer(my,opp);
                
                // Update UI (health is updated by Firebase listeners)
                document.getElementById('p1SpecialFill').style.width=this.players[0].special+'%';
                document.getElementById('p2SpecialFill').style.width=this.players[1].special+'%';
                document.getElementById('p1RageFill').style.width=this.players[0].rage+'%';
                document.getElementById('p2RageFill').style.width=this.players[1].rage+'%';
            }

            updatePlayer(player, opponent) {
                player.isBlocking = this.buttonStates.block;
                let move=0;
                if(player.state!=='hurt' && player.stateTimer<=0 && !player.hitLocked){
                    if(this.buttonStates.left) move = -player.speed;
                    if(this.buttonStates.right) move = player.speed;
                }
                if(move!==0){ 
                    player.x += move; 
                    player.x = Math.max(100, Math.min(1100, player.x));
                }
                player.facing = opponent.x > player.x ? 1 : -1;
                player.y = 400 + Math.sin(this.frame*0.1)*5;
                
                // Mana regen - update in Firebase occasionally
                if(player.special < player.maxSpecial) {
                    player.special = Math.min(player.maxSpecial, player.special+0.2);
                    if(this.battleRef && Math.floor(Math.random()*10)===0) { // Update occasionally to reduce Firebase writes
                        const mpPath = player.id==='kenji'?'player1/mana':'player2/mana';
                        this.battleRef.child(mpPath).set(Math.floor(player.special));
                    }
                }
                
                // Rage decay
                if(player.rage > 0 && !this.rageMode) {
                    player.rage = Math.max(0, player.rage-0.1);
                }
            }

            draw() {
                this.ctx.save();
                
                // Screen shake
                if(this.shakeIntensity>0) {
                    this.ctx.translate((Math.random()-0.5)*this.shakeIntensity*2, (Math.random()-0.5)*this.shakeIntensity);
                }
                
                // Flash white effect
                if (this.flashWhite > 0) {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                
                const scaleX = this.canvas.width/1200;
                const scaleY = this.canvas.height/700;
                const scale = Math.min(scaleX, scaleY);
                const offsetX = (this.canvas.width-1200*scale)/2;
                const offsetY = (this.canvas.height-700*scale)/2;
                
                this.ctx.save();
                this.ctx.translate(offsetX, offsetY);
                this.ctx.scale(scale, scale);
                
                // Dynamic background
                const grad = this.ctx.createLinearGradient(0,0,0,700);
                grad.addColorStop(0,'#0a1a2a');
                grad.addColorStop(0.5,'#1a2a3a');
                grad.addColorStop(1,'#2a1a1a');
                this.ctx.fillStyle=grad; 
                this.ctx.fillRect(0,0,1200,700);
                
                // Ground with texture
                this.ctx.fillStyle='#2a3a2a';
                this.ctx.fillRect(0,400,1200,300);
                
                // Ground lines
                this.ctx.strokeStyle='#fbbf24';
                this.ctx.lineWidth=2; 
                this.ctx.setLineDash([15,15]);
                this.ctx.beginPath(); 
                this.ctx.moveTo(0,420); 
                this.ctx.lineTo(1200,420); 
                this.ctx.stroke(); 
                this.ctx.setLineDash([]);
                
                // Rage mode overlay
                if(this.rageMode) { 
                    this.ctx.fillStyle='rgba(255,0,0,0.1)'; 
                    this.ctx.fillRect(0,0,1200,700); 
                }
                
                // Shockwaves
                this.shockwaves.forEach(s=>{
                    this.ctx.save(); 
                    this.ctx.globalAlpha=s.life*0.7; 
                    this.ctx.strokeStyle='#fff'; 
                    this.ctx.lineWidth=4; 
                    this.ctx.shadowColor='#fbbf24'; 
                    this.ctx.shadowBlur=20;
                    this.ctx.beginPath(); 
                    this.ctx.arc(s.x,s.y,s.radius,0,Math.PI*2); 
                    this.ctx.stroke(); 
                    this.ctx.restore();
                });
                
                // Draw players
                this.players.forEach(p=>this.drawPlayer(p));
                
                // Blood particles
                this.bloodParticles.forEach(p=>{
                    this.ctx.save(); 
                    this.ctx.globalAlpha=p.life*0.8; 
                    this.ctx.fillStyle=p.color; 
                    this.ctx.shadowColor='#8B0000'; 
                    this.ctx.shadowBlur=10;
                    this.ctx.beginPath(); 
                    this.ctx.arc(p.x,p.y,p.size||4,0,Math.PI*2); 
                    this.ctx.fill(); 
                    this.ctx.restore();
                });
                
                // Special effects
                this.specialEffects.forEach(e=>{
                    this.ctx.save(); 
                    this.ctx.globalAlpha=e.life; 
                    this.ctx.fillStyle=e.color; 
                    this.ctx.shadowColor='#ffd700'; 
                    this.ctx.shadowBlur=15;
                    this.ctx.beginPath(); 
                    this.ctx.arc(e.x,e.y,8,0,Math.PI*2); 
                    this.ctx.fill(); 
                    this.ctx.restore();
                });
                
                // Block effects
                this.blockEffects.forEach(e=>{
                    this.ctx.save(); 
                    this.ctx.globalAlpha=e.life; 
                    this.ctx.fillStyle=e.color; 
                    this.ctx.shadowColor='#22c55e'; 
                    this.ctx.shadowBlur=15;
                    this.ctx.beginPath(); 
                    this.ctx.arc(e.x,e.y,6,0,Math.PI*2); 
                    this.ctx.fill(); 
                    this.ctx.restore();
                });
                
                this.ctx.restore();
                this.ctx.restore();
            }

            drawPlayer(p) {
                if(!p.id||!p.images){
                    this.ctx.save();
                    this.ctx.fillStyle='rgba(100,100,100,0.5)'; 
                    this.ctx.fillRect(p.x-50, p.y-120, 100, 120);
                    this.ctx.fillStyle='#fbbf24'; 
                    this.ctx.font='bold 60px Arial'; 
                    this.ctx.textAlign='center'; 
                    this.ctx.textBaseline='middle';
                    this.ctx.fillText('?',p.x, p.y-40);
                    this.ctx.restore(); 
                    return;
                }
                
                const img = p.images[p.state] || p.images.idle;
                const x = p.x-50, y = p.y-120, w=100, h=120;
                
                this.ctx.save();
                
                // Flip if facing left
                if(p.facing===-1){ 
                    this.ctx.translate(p.x, p.y-60); 
                    this.ctx.scale(-1,1); 
                    this.ctx.translate(-p.x, -(p.y-60)); 
                }
                
                // Glow effects
                if(this.rageMode && p.controlledBy===this.playerRole){ 
                    this.ctx.shadowColor='#ff0000'; 
                    this.ctx.shadowBlur=40; 
                }
                if(this.comboChain.multiplier>1 && p.controlledBy===this.playerRole){ 
                    this.ctx.shadowColor='#ffd700'; 
                    this.ctx.shadowBlur=30+(this.comboChain.multiplier*10); 
                }
                
                // Draw character
                if(img && img.complete && img.naturalHeight!==0){
                    this.ctx.drawImage(img, x, y, w, h);
                } else {
                    this.ctx.fillStyle = p.id==='kenji'?'#ef4444':'#ff69b4';
                    this.ctx.fillRect(x, y, w, h);
                    this.ctx.fillStyle='#ffffff'; 
                    this.ctx.font='bold 40px Arial';
                    this.ctx.fillText(p.id==='kenji'?'⚔️':'🌸', x+30, y+70);
                }
                
                // Player indicator
                if(p.controlledBy===this.playerRole){
                    this.ctx.shadowColor='#fbbf24'; 
                    this.ctx.shadowBlur=30; 
                    this.ctx.strokeStyle='#fbbf24'; 
                    this.ctx.lineWidth=4; 
                    this.ctx.setLineDash([8,8]);
                    this.ctx.beginPath(); 
                    this.ctx.ellipse(p.x, p.y-60, 45, 60, 0, 0, Math.PI*2); 
                    this.ctx.stroke(); 
                    this.ctx.setLineDash([]);
                }
                
                // Block effect
                if(p.isBlocking){
                    this.ctx.shadowColor='#22c55e'; 
                    this.ctx.shadowBlur=40; 
                    this.ctx.strokeStyle='#22c55e'; 
                    this.ctx.lineWidth=5;
                    this.ctx.beginPath(); 
                    this.ctx.ellipse(p.x, p.y-60, 50, 70, 0, 0, Math.PI*2); 
                    this.ctx.stroke();
                    this.ctx.fillStyle='rgba(34,197,94,0.2)'; 
                    this.ctx.fill();
                }
                
                // Movement trail
                if((this.buttonStates.left||this.buttonStates.right) && p.state!=='hurt' && !p.hitLocked && p.controlledBy===this.playerRole){
                    for(let i=0;i<4;i++){
                        this.ctx.strokeStyle = `rgba(255,255,255,${0.2-i*0.04})`; 
                        this.ctx.lineWidth=2; 
                        this.ctx.beginPath();
                        const dir = this.buttonStates.left?-1:1;
                        this.ctx.moveTo(p.x-(dir*30), p.y-60+i*10); 
                        this.ctx.lineTo(p.x-(dir*100), p.y-60+i*10+(i-2)*5); 
                        this.ctx.stroke();
                    }
                }
                
                this.ctx.restore();
            }

            gameLoop() { 
                this.update(); 
                this.draw(); 
                requestAnimationFrame(()=>this.gameLoop()); 
            }
        }
    </script>
    <script>
    // ========== FIX: CORRECT DAMAGE APPLICATION ==========
    // Override the problematic performAttack method
    (function fixDamageLogic() {
        const originalPerformAttack = window.FightingGame?.prototype?.performAttack;
        
        // Wait for game to initialize
        const interval = setInterval(() => {
            if (window.game && window.game instanceof window.FightingGame) {
                clearInterval(interval);
                
                // Store reference to original method
                const gamePrototype = Object.getPrototypeOf(window.game);
                
                // Replace performAttack with corrected version
                gamePrototype.performAttack = function(type) {
                    const now = Date.now();
                    if (now - this.lastAttackTime < 200) return;
                    this.lastAttackTime = now;
                    
                    const attacker = this.players.find(p => p.controlledBy === this.playerRole);
                    const defender = this.players.find(p => p.controlledBy !== this.playerRole);
                    
                    if (!attacker || !defender) return;
                    
                    const dist = Math.abs(attacker.x - defender.x);
                    if (dist < 200) {
                        const move = MOVE_DATABASE[type];
                        if (!move) return;
                        
                        const blocking = defender.isBlocking;
                        let finalDmg = Math.floor(move.damage * (this.rageMode ? 1.5 : 1) * this.comboChain.multiplier);
                        if (blocking) finalDmg = Math.floor(finalDmg * 0.2);
                        
                        // CRITICAL FIX: Only damage defender, not attacker
                        const newDefenderHealth = Math.max(0, defender.health - finalDmg);
                        
                        // Update defender's health in Firebase ONLY
                        if (this.battleRef) {
                            const defenderHpPath = defender.id === 'kenji' ? 'player1/health' : 'player2/health';
                            this.battleRef.child(defenderHpPath).set(newDefenderHealth);
                        }
                        
                        // Visual effects
                        this.hitStop = blocking ? 3 : 5;
                        defender.hitLocked = true;
                        defender.state = 'hurt';
                        defender.stateTimer = 15;
                        
                        attacker.state = type;
                        attacker.stateTimer = 15;
                        attacker.attackTimer = 20;
                        
                        // Show damage number at defender's position
                        const rect = this.canvas.getBoundingClientRect();
                        const scaleX = this.canvas.width / 1200;
                        const scaleY = this.canvas.height / 700;
                        const scale = Math.min(scaleX, scaleY);
                        const offsetX = (this.canvas.width - 1200 * scale) / 2;
                        const offsetY = (this.canvas.height - 700 * scale) / 2;
                        const screenX = rect.left + offsetX + defender.x * scale;
                        const screenY = rect.top + offsetY + (defender.y - 60) * scale;
                        
                        if (!blocking) {
                            this.showBattleMessage(`💥 -${finalDmg}`, '#ef4444');
                            showDamageNumber(screenX, screenY, finalDmg);
                            
                            // Gain mana for successful hit
                            attacker.special = Math.min(attacker.maxSpecial, attacker.special + 8);
                            if (this.battleRef) {
                                const attackerMpPath = attacker.id === 'kenji' ? 'player1/mana' : 'player2/mana';
                                this.battleRef.child(attackerMpPath).set(attacker.special);
                            }
                            
                            // Combo system
                            this.comboChain.count++;
                            this.comboChain.timer = this.comboChain.maxTimer;
                            this.combo.count++;
                            this.combo.timer = 30;
                            
                            document.getElementById('comboIndicator').style.display = 'block';
                            document.getElementById('comboIndicator').innerHTML = `🔥 ${this.combo.count} HIT!`;
                            
                            if (this.combo.count % 5 === 0) {
                                playSound('critical', 0.5);
                                this.shockwaves.push({ x: defender.x, y: defender.y - 50, radius: 30, life: 1 });
                                attacker.rage = Math.min(attacker.maxRage, attacker.rage + 40);
                                this.flashWhite = 3;
                            }
                            
                            // Blood particles at defender's position
                            for (let i = 0; i < (this.rageMode ? 20 : 10); i++) {
                                this.bloodParticles.push({
                                    x: defender.x,
                                    y: defender.y - 50,
                                    vx: (Math.random() - 0.5) * 12,
                                    vy: (Math.random() - 0.5) * 12 - 5,
                                    life: 1,
                                    size: 2 + Math.random() * 5,
                                    color: '#B22222'
                                });
                            }
                            
                            this.shockwaves.push({ x: defender.x, y: defender.y - 50, radius: 20, life: 0.3 });
                            
                            // Gain rage for attacker
                            attacker.rage = Math.min(attacker.maxRage, attacker.rage + this.rageGainPerHit);
                            if (attacker.rage >= attacker.maxRage && !this.rageMode) this.activateRageMode();
                            
                            playSound('hit', 0.3);
                        } else {
                            // Blocked attack - no damage to defender
                            this.showBattleMessage('🛡️ BLOCKED!', '#22c55e');
                            showDamageNumber(screenX, screenY, finalDmg, false, false, true);
                            
                            for (let i = 0; i < 15; i++) {
                                this.blockEffects.push({
                                    x: defender.x,
                                    y: defender.y - 50,
                                    vx: (Math.random() - 0.5) * 10,
                                    vy: (Math.random() - 0.5) * 10 - 5,
                                    life: 0.8,
                                    color: '#22c55e'
                                });
                            }
                            this.comboChain.count = 0;
                            this.comboChain.multiplier = 1;
                            playSound('block', 0.4);
                        }
                        
                        // Update UI
                        document.getElementById('p1SpecialFill').style.width = this.players[0].special + '%';
                        document.getElementById('p2SpecialFill').style.width = this.players[1].special + '%';
                        document.getElementById('p1RageFill').style.width = this.players[0].rage + '%';
                        document.getElementById('p2RageFill').style.width = this.players[1].rage + '%';
                    }
                };
                
                // Also fix useSpecialMove method
                gamePrototype.useSpecialMove = function(move) {
                    const my = this.players.find(p => p.controlledBy === this.playerRole);
                    const opp = this.players.find(p => p.controlledBy !== this.playerRole);
                    
                    if (!my || !opp || this.gameOver) return;
                    if (my.hitLocked || my.state === 'hurt' || my.attackTimer > 0) {
                        this.showBattleMessage('❌ CANNOT ACT!', '#ef4444');
                        return;
                    }
                    if (Math.abs(my.x - opp.x) > 250) {
                        this.showBattleMessage('❌ TOO FAR!', '#ef4444');
                        return;
                    }
                    if (my.special < move.manaCost) {
                        this.showBattleMessage(`❌ NEED ${move.manaCost} MP`, '#ef4444');
                        return;
                    }
                    
                    // Deduct mana from attacker
                    my.special -= move.manaCost;
                    if (this.battleRef) {
                        const mpPath = my.id === 'kenji' ? 'player1/mana' : 'player2/mana';
                        this.battleRef.child(mpPath).set(my.special);
                    }
                    
                    if (move.heal) {
                        // HEAL - update attacker's health (self-heal)
                        const newHealth = Math.min(100, my.health + move.heal);
                        if (this.battleRef) {
                            const hpPath = my.id === 'kenji' ? 'player1/health' : 'player2/health';
                            this.battleRef.child(hpPath).set(newHealth);
                        }
                        
                        const rect = this.canvas.getBoundingClientRect();
                        const scaleX = this.canvas.width / 1200;
                        const scaleY = this.canvas.height / 700;
                        const scale = Math.min(scaleX, scaleY);
                        const offsetX = (this.canvas.width - 1200 * scale) / 2;
                        const offsetY = (this.canvas.height - 700 * scale) / 2;
                        const screenX = rect.left + offsetX + my.x * scale;
                        const screenY = rect.top + offsetY + (my.y - 60) * scale;
                        showDamageNumber(screenX, screenY, move.heal, false, true);
                        
                        this.showBattleMessage(`💚 +${move.heal} HP`, '#10b981');
                        playSound('heal', 0.5);
                        
                        for (let i = 0; i < 20; i++) {
                            this.specialEffects.push({
                                x: my.x,
                                y: my.y - 50,
                                vx: (Math.random() - 0.5) * 8,
                                vy: (Math.random() - 0.5) * 8 - 5,
                                life: 1,
                                color: '#10b981'
                            });
                        }
                    } else {
                        // ATTACK - damage OPPONENT only
                        const chainBonus = this.comboChain.multiplier;
                        const dmgBoost = this.rageMode ? 1.5 : 1;
                        const crit = Math.random() < 0.2;
                        let finalDmg = Math.floor(move.damage * dmgBoost * chainBonus);
                        
                        this.hitStop = 5;
                        
                        if (crit) {
                            finalDmg += Math.floor(move.damage * 0.5);
                            this.showBattleMessage(`✨ CRITICAL! ${finalDmg}`, '#ffd700');
                            playSound('critical', 0.6);
                            this.flashWhite = 5;
                            this.shakeIntensity = 40;
                        } else {
                            this.showBattleMessage(`💥 -${finalDmg}`, '#ef4444');
                            playSound('hit', 0.3);
                        }
                        
                        // CRITICAL FIX: Only damage opponent
                        const newOppHealth = Math.max(0, opp.health - finalDmg);
                        
                        if (this.battleRef) {
                            const oppHpPath = opp.id === 'kenji' ? 'player1/health' : 'player2/health';
                            this.battleRef.child(oppHpPath).set(newOppHealth);
                        }
                        
                        const rect = this.canvas.getBoundingClientRect();
                        const scaleX = this.canvas.width / 1200;
                        const scaleY = this.canvas.height / 700;
                        const scale = Math.min(scaleX, scaleY);
                        const offsetX = (this.canvas.width - 1200 * scale) / 2;
                        const offsetY = (this.canvas.height - 700 * scale) / 2;
                        const screenX = rect.left + offsetX + opp.x * scale;
                        const screenY = rect.top + offsetY + (opp.y - 60) * scale;
                        showDamageNumber(screenX, screenY, finalDmg, crit);
                        
                        opp.hitLocked = true;
                        opp.state = 'hurt';
                        opp.stateTimer = 15;
                        opp.x += (my.facing > 0 ? 80 : -80);
                        opp.x = Math.max(100, Math.min(1100, opp.x));
                        
                        this.shakeIntensity = 35;
                        
                        for (let i = 0; i < (this.rageMode ? 40 : 20); i++) {
                            this.bloodParticles.push({
                                x: opp.x,
                                y: opp.y - 50,
                                vx: (Math.random() - 0.5) * 15,
                                vy: (Math.random() - 0.5) * 15 - 5,
                                life: 1.2,
                                size: 3 + Math.random() * 6,
                                color: crit ? '#8B0000' : '#B22222'
                            });
                        }
                        
                        this.shockwaves.push({ x: opp.x, y: opp.y - 50, radius: 30, life: 0.5 });
                        
                        my.rage = Math.min(my.maxRage, my.rage + this.rageGainPerHit);
                        if (my.rage >= my.maxRage && !this.rageMode) this.activateRageMode();
                        
                        this.comboChain.count++;
                        this.comboChain.timer = this.comboChain.maxTimer;
                        playSound('combo', 0.2);
                    }
                    
                    my.attackTimer = 20;
                    my.state = 'punch';
                    my.stateTimer = 15;
                    
                    document.getElementById('p1RageFill').style.width = this.players[0].rage + '%';
                    document.getElementById('p2RageFill').style.width = this.players[1].rage + '%';
                };
                
                console.log("✅ Damage logic fixed! Attacks now properly damage opponents.");
            }
        }, 100);
    })();
</script>
