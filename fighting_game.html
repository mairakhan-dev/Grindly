<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ KENJI VS SAKURA – ULTIMATE EDITION ⚡</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" href="/favicon.ico">
<link rel="manifest" href="/site.webmanifest">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1a0033, #000 70%);
            overflow: hidden;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(251, 191, 36, 0.03) 20px,
                rgba(251, 191, 36, 0.03) 40px
            );
            animation: bgMove 20s linear infinite;
        }
        
        @keyframes bgMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(5deg); }
        }
        
        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(251, 191, 36, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* ---------- CHARACTER SELECTION ---------- */
        .character-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0033 0%, #000 100%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            padding: 20px;
            overflow-y: auto;
            animation: modalFadeIn 0.5s ease-out;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .character-modal.hidden {
            display: none !important;
        }
        
        .character-select-card {
            background: linear-gradient(135deg, rgba(30,41,59,0.98), rgba(15,23,42,0.99));
            border: 4px solid #fbbf24;
            border-radius: 50px;
            padding: clamp(20px, 5vh, 50px);
            max-width: 1200px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 100px rgba(251,191,36,0.5), 0 0 200px rgba(251,191,36,0.3);
            animation: cardPulse 3s infinite;
            position: relative;
            overflow: hidden;
        }
        
        .character-select-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes cardPulse {
            0%, 100% { box-shadow: 0 0 100px rgba(251,191,36,0.5), 0 0 200px rgba(251,191,36,0.3); }
            50% { box-shadow: 0 0 150px rgba(251,191,36,0.7), 0 0 300px rgba(251,191,36,0.5); }
        }
        
        .character-select-title {
            font-size: clamp(2rem, 6vw, 4rem);
            color: #fbbf24;
            margin-bottom: 30px;
            text-shadow: 0 0 30px #fbbf24, 0 0 60px #fbbf24;
            font-family: 'Bangers', cursive;
            letter-spacing: 4px;
            animation: titleGlitch 3s infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes titleGlitch {
            0%, 100% { text-shadow: 2px 2px 0 #ff0000, -2px -2px 0 #00ff00; }
            25% { text-shadow: -2px 2px 0 #ff0000, 2px -2px 0 #00ff00; }
            50% { text-shadow: 2px -2px 0 #ff0000, -2px 2px 0 #00ff00; }
            75% { text-shadow: -2px -2px 0 #ff0000, 2px 2px 0 #00ff00; }
        }
        
        .character-options {
            display: flex;
            flex-direction: row;
            gap: clamp(15px, 3vw, 30px);
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        .character-option {
            cursor: pointer;
            padding: clamp(15px, 3vh, 30px);
            border-radius: 25px;
            background: rgba(0,0,0,0.8);
            border: 3px solid transparent;
            width: min(280px, 45%);
            min-width: 200px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        
        .character-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(251,191,36,0.2), transparent);
            transition: left 0.5s;
        }
        
        .character-option:hover::before {
            left: 100%;
        }
        
        .character-option.selected {
            border-color: #fbbf24;
            background: rgba(251,191,36,0.2);
            box-shadow: 0 0 50px rgba(251,191,36,0.5);
            transform: scale(1.05);
        }
        
        .character-option.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.8);
            pointer-events: none;
        }
        
        .character-preview {
            width: min(150px, 70%);
            height: auto;
            aspect-ratio: 200/240;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 8vw, 5rem);
            border: 3px solid #fbbf24;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: previewFloat 3s infinite ease-in-out;
        }
        
        @keyframes previewFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .character-name {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #fbbf24;
            font-family: 'Bangers', cursive;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #fbbf24;
        }
        
        .character-desc {
            color: #9ca3af;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
        }
        
        .character-stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            color: #fbbf24;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            flex-wrap: wrap;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 25px;
            border: 1px solid #fbbf24;
        }
        
        .confirm-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: black;
            border: none;
            padding: clamp(15px, 3vh, 25px) clamp(30px, 6vw, 60px);
            font-size: clamp(1.3rem, 5vw, 2rem);
            border-radius: 60px;
            border: 4px solid #fbbf24;
            cursor: pointer;
            font-family: 'Bangers', cursive;
            box-shadow: 0 8px 0 #b45309, 0 0 50px #fbbf24;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
            position: relative;
            z-index: 1;
            animation: btnPulse 2s infinite;
        }
        
        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 8px 0 #b45309, 0 0 30px #fbbf24; }
            50% { box-shadow: 0 8px 0 #b45309, 0 0 60px #fbbf24; }
        }
        
        .confirm-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #b45309, 0 0 50px #fbbf24;
        }
        
        .confirm-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.8);
        }
        
        /* ---------- MAIN GAME LAYOUT ---------- */
        .game-container {
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: 100vh;
            position: relative;
            animation: gameFadeIn 0.5s ease-out;
        }
        
        @keyframes gameFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .left-panel {
            width: 60%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        
        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(251,191,36,0.1), transparent 70%);
            pointer-events: none;
            animation: panelGlow 5s infinite;
        }
        
        @keyframes panelGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: linear-gradient(180deg, #0a1a2a 0%, #1a2a3a 50%, #2a1a1a 100%);
            cursor: none;
            filter: drop-shadow(0 0 20px rgba(251,191,36,0.3));
        }
        
        canvas.rage-mode {
            filter: drop-shadow(0 0 30px #ff0000) brightness(1.2);
            animation: screenShake 0.1s infinite;
        }
        
        @keyframes screenShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            75% { transform: translate(5px, -5px); }
            100% { transform: translate(-5px, 5px); }
        }
        
        .right-panel {
            width: 38%;
            height: 100vh;
            background: linear-gradient(135deg, rgba(10,11,26,0.98), rgba(26,0,51,0.98));
            border-left: 2px solid #fbbf24;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
            overflow-y: auto;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        
        /* Custom scrollbar */
        .right-panel::-webkit-scrollbar {
            width: 8px;
        }
        
        .right-panel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        
        .right-panel::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 4px;
            box-shadow: 0 0 10px #fbbf24;
        }
        
        .top-info {
            background: rgba(0,0,0,0.9);
            border: 2px solid #fbbf24;
            border-radius: 15px;
            padding: 8px;
            text-align: center;
            color: #fbbf24;
            font-size: 14px;
            font-family: 'Press Start 2P', cursive;
            text-shadow: 0 0 10px #fbbf24;
            animation: infoPulse 2s infinite;
        }
        
        @keyframes infoPulse {
            0%, 100% { border-color: #fbbf24; }
            50% { border-color: #ff0000; }
        }
        
        .player-huds {
            display: flex;
            gap: 8px;
        }
        
        .player-hud {
            flex: 1;
            background: rgba(0,0,0,0.95);
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .player-hud::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(251,191,36,0.2), transparent);
            animation: hudScan 3s infinite;
        }
        
        @keyframes hudScan {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }
        
        .player-hud.left { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.3); }
        .player-hud.right { border-color: #ff69b4; box-shadow: 0 0 20px rgba(255,105,180,0.3); }
        
        .player-name-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .player-name {
            font-size: 14px;
            font-weight: 900;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }
        .left .player-name { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
        .right .player-name { color: #ff69b4; text-shadow: 0 0 10px #ff69b4; }
        
        .player-level {
            background: #fbbf24;
            color: black;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 0 10px #fbbf24;
        }
        
        .health-bar {
            height: 12px;
            background: #000;
            border: 1px solid #fbbf24;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 4px;
            position: relative;
        }
        
        .health-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: healthShine 2s infinite;
        }
        
        @keyframes healthShine {
            0% { transform: translateX(-100%); }
            20% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }
        
        .health-fill {
            height: 100%;
            width: 100%;
            transition: width 0.1s ease-out;
        }
        .left .health-fill { background: linear-gradient(90deg, #ef4444, #ff8a8a); }
        .right .health-fill { background: linear-gradient(90deg, #ff69b4, #ffb6c1); }
        
        .special-bar, .rage-bar {
            height: 6px;
            background: #000;
            border: 1px solid #fbbf24;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 3px;
        }
        .special-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fbbf24, #ffd700);
            transition: width 0.2s;
            box-shadow: 0 0 10px #fbbf24;
        }
        .rage-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff0000, #8b0000);
            transition: width 0.2s;
            box-shadow: 0 0 10px #ff0000;
        }
        
        .timer {
            background: rgba(0,0,0,0.95);
            border: 2px solid #fbbf24;
            border-radius: 30px;
            padding: 5px 15px;
            font-size: 28px;
            color: #fbbf24;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            margin: 5px 0;
            text-shadow: 0 0 20px #fbbf24;
            animation: timerPulse 1s infinite;
        }
        
        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .indicators {
            display: flex;
            gap: 8px;
        }
        .rage-indicator, .combo-indicator {
            flex: 1;
            background: rgba(0,0,0,0.95);
            border: 2px solid #fbbf24;
            border-radius: 10px;
            padding: 5px;
            text-align: center;
            font-size: 12px;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }
        .rage-indicator { 
            color: #ff0000; 
            display: none; 
            border-color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            animation: ragePulse 0.5s infinite;
        }
        .combo-indicator { 
            color: #ffd700; 
            display: none; 
            border-color: #ffd700;
            box-shadow: 0 0 20px #ffd700;
            animation: comboPulse 0.3s infinite;
        }
        
        @keyframes ragePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes comboPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 8px 0;
        }
        .action-btn {
            background: linear-gradient(135deg, #333, #222);
            color: white;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 10px 5px;
            font-size: 12px;
            font-weight: 900;
            font-family: 'Bangers', cursive;
            cursor: pointer;
            box-shadow: 0 3px 0 #000, 0 0 10px #fbbf24;
            text-transform: uppercase;
            touch-action: manipulation;
            transition: all 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(251,191,36,0.3), transparent);
            transition: left 0.3s;
        }
        
        .action-btn:hover::before {
            left: 100%;
        }
        
        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000, 0 0 20px #fbbf24;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: black;
        }
        
        .ultimate-btn {
            grid-column: span 3;
            background: linear-gradient(135deg, #ff0000, #8b0000);
            color: white;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 10px;
            font-size: 16px;
            font-family: 'Bangers', cursive;
            cursor: pointer;
            box-shadow: 0 3px 0 #000, 0 0 30px #ff0000;
            animation: ultimatePulse 1s infinite;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }
        
        .ultimate-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
            animation: rotate 10s linear infinite;
        }
        
        .ultimate-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000, 0 0 50px #ff0000;
        }
        
        @keyframes ultimatePulse {
            0%,100% { box-shadow: 0 3px 0 #000, 0 0 30px #ff0000; }
            50% { box-shadow: 0 3px 0 #000, 0 0 60px #ff0000; }
        }
        
        .special-moves {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 6px 0 4px;
            padding: 8px 6px;
            background: rgba(0,0,0,0.98);
            border: 2px solid #fbbf24;
            border-radius: 16px;
            max-height: none;
            overflow: visible;
            flex: 0 1 auto;
            width: 100%;
            box-shadow: inset 0 0 20px rgba(251,191,36,0.2);
        }
        
        .special-move-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 8px 5px;
            font-size: 12px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 65px;
            cursor: pointer;
            box-shadow: 0 3px 0 #000, 0 0 10px #3b82f6;
            touch-action: manipulation;
            transition: transform 0.05s, background 0.1s;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }
        
        .special-move-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.3s;
        }
        
        .special-move-btn:hover::before {
            left: 100%;
        }
        
        .special-move-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #000, 0 0 20px #fbbf24;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: black;
            border-color: #000;
        }
        
        .special-move-btn .icon {
            font-size: 20px;
            line-height: 1;
            margin-bottom: 2px;
            filter: drop-shadow(0 0 5px currentColor);
        }
        
        .special-move-btn span:not(.icon) {
            font-size: 9px;
            font-family: 'Bangers', cursive;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px;
            padding: 0 2px;
        }
        
        .special-move-btn .cost {
            background: #000000aa;
            border-radius: 20px;
            padding: 2px 6px;
            margin-top: 2px;
            font-size: 8px;
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }
        
        .special-move-btn.rare { 
            background: linear-gradient(135deg, #a855f7, #7e22ce);
            box-shadow: 0 3px 0 #000, 0 0 10px #a855f7;
        }
        .special-move-btn.epic { 
            background: linear-gradient(135deg, #ec4899, #be185d);
            box-shadow: 0 3px 0 #000, 0 0 10px #ec4899;
        }
        .special-move-btn.legendary { 
            background: linear-gradient(135deg, #f97316, #c2410c); 
            animation: legendaryGlow 2s infinite;
            border-color: gold;
            box-shadow: 0 3px 0 #000, 0 0 20px gold;
        }
        @keyframes legendaryGlow { 
            50% { border-color: #ffd700; box-shadow: 0 3px 0 #000, 0 0 30px gold; } 
        }
        
        .restart-hint {
            color: #fbbf24;
            font-size: 10px;
            text-align: center;
            opacity: 0.8;
            font-family: 'Press Start 2P', cursive;

        function initAudio() {

            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        function playSound(type, volume = 0.3) {
            if (!soundEnabled) return;
            initAudio();
            
            try {
                const now = audioContext.currentTime;
                
                switch(type) {
                    case 'punch':
                        playPunchSound(volume);
                        break;
                    case 'kick':
                        playKickSound(volume);
                        break;
                    case 'block':
                        playBlockSound(volume);
                        break;
                    case 'hit':
                        playHitSound(volume);
                        break;
                    case 'critical':
                        playCriticalSound(volume);
                        break;
                    case 'ko':
                        playKOSound(volume);
                        break;
                    case 'victory':
                        playVictorySound(volume);
                        break;
                    case 'select':
                        playSelectSound(volume);
                        break;
                    case 'rage':
                        playRageSound(volume);
                        break;
                    case 'ultimate':
                        playUltimateSound(volume);
                        break;
                    case 'heal':
                        playHealSound(volume);
                        break;
                    case 'warning':
                        playWarningSound(volume);
                        break;
                    case 'combo':
                        playComboSound(volume);
                        break;
                }
            } catch(e) {
                console.log('Sound error:', e);
            }
        }
        
        function playPunchSound(volume) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'sawtooth';
            filter.type = 'lowpass';
            filter.frequency.value = 800;
            
            osc.frequency.setValueAtTime(200, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.1);
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.2);
        }
        
        function playKickSound(volume) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'triangle';
            filter.type = 'lowpass';
            filter.frequency.value = 600;
            
            osc.frequency.setValueAtTime(150, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.15);
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.25);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.25);
        }
        
        function playBlockSound(volume) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.05);
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.1);
        }

            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioContext.currentTime);

            osc.start();
            osc.stop(audioContext.currentTime + 0.15);
        }
        
        function playCriticalSound(volume) {
            for(let i = 0; i < 3; i++) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600 + i * 200, audioContext.currentTime + i * 0.05);
                osc.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2 + i * 0.05);
                
                gain.gain.setValueAtTime(volume * 0.5, audioContext.currentTime + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3 + i * 0.05);
                
                osc.start(audioContext.currentTime + i * 0.05);
                osc.stop(audioContext.currentTime + 0.3 + i * 0.05);
            }
        }
        
        function playKOSound(volume) {
            for(let i = 0; i < 3; i++) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200 - i * 30, audioContext.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioContext.currentTime + 1);
                
                gain.gain.setValueAtTime(volume * 0.5, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
                
                osc.start();
                osc.stop(audioContext.currentTime + 1);
            }
        }
        
        function playVictorySound(volume) {

                const gain = audioContext.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.15);
                
                gain.gain.setValueAtTime(volume, audioContext.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3 + i * 0.15);
                
                osc.start(audioContext.currentTime + i * 0.15);
                osc.stop(audioContext.currentTime + 0.3 + i * 0.15);
            });

            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'sine';

                osc.connect(gain);

                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5 + i * 0.1);
                
                osc.start(audioContext.currentTime + i * 0.1);
                osc.stop(audioContext.currentTime + 0.5 + i * 0.1);
            }
        }
        
        function playUltimateSound(volume) {
            for(let i = 0; i < 5; i++) {

                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200 + i * 100, audioContext.currentTime + i * 0.1);
                osc.frequency.linearRampToValueAtTime(800 + i * 200, audioContext.currentTime + 0.5 + i * 0.1);
                
                gain.gain.setValueAtTime(volume * 0.3, audioContext.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.6 + i * 0.1);
                
                osc.start(audioContext.currentTime + i * 0.1);
                osc.stop(audioContext.currentTime + 0.6 + i * 0.1);
            }
        }
        
        function playHealSound(volume) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.2);
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.3);
        }
        
        function playWarningSound(volume) {

            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.2);
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            osc.start();
            osc.stop(audioContext.currentTime + 0.3);
        }
        
        function playComboSound(volume) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioContext.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);

        // ========== CHARACTER SELECTION ==========
        window.selectCharacter = function(character) {
            const option = document.getElementById(`choose${character.charAt(0).toUpperCase()+character.slice(1)}`);
            if (option.classList.contains('locked')) {
                playSound('block');
                document.getElementById('characterTakenMessage').textContent = `❌ ${character.toUpperCase()} is already taken!`;
                return;
            }
            playSound('select');
            selectedCharacter = character;
            document.querySelectorAll('.character-option').forEach(opt=>opt.classList.remove('selected'));
            option.classList.add('selected');
            document.getElementById('confirmCharacterBtn').disabled = false;
            document.getElementById('confirmCharacterBtn').textContent = `⚡ FIGHT AS ${character.toUpperCase()} ⚡`;
        };

        window.confirmCharacter = async function() {
            if (!selectedCharacter) return;
            playSound('select');
            await initFirebaseAndStart();
            const snapshot = await battleRef.child('characters').once('value');
            const characters = snapshot.val() || {};
            if (characters.player1 === selectedCharacter || characters.player2 === selectedCharacter) {
                playSound('block');
                document.getElementById('characterTakenMessage').textContent = `❌ ${selectedCharacter.toUpperCase()} already taken!`;
                return;
            }
            if (playerRole === 'player1') {
                await battleRef.child('characters/player1').set(selectedCharacter);
            } else if (playerRole === 'player2') {
                await battleRef.child('characters/player2').set(selectedCharacter);
            } else {
                if (!characters.player1) {
                    await battleRef.child('characters/player1').set(selectedCharacter);
                    playerRole = 'player1';
                } else if (!characters.player2) {
                    await battleRef.child('characters/player2').set(selectedCharacter);
                    playerRole = 'player2';
                } else {
                    alert('Game full!'); return;
                }
            }
            proceedToGame();
        };

        async function initFirebaseAndStart() {
            try {
                if (typeof firebase === 'undefined') await loadFirebaseScripts();
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                battleRef = database.ref('battles/' + battleCode);
                battleRef.child('characters').on('value', (snap) => updateCharacterSelectionUI(snap.val() || {}));
            } catch(e){ console.error(e); }
        }

        function loadFirebaseScripts() {

                const s=document.createElement('script'); s.src='https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js';
                s.onload=()=>{ const d=document.createElement('script'); d.src='https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js'; d.onload=resolve; d.onerror=reject; document.head.appendChild(d); };
                s.onerror=reject; document.head.appendChild(s);
            });
        }

        function loadEquippedMoves() {

                const equippedIds = JSON.parse(localStorage.getItem('battleEquippedMoves')||'["punch","kick"]');
                const owned = JSON.parse(localStorage.getItem('battleOwnedMoves')||'[]');
                return [MOVE_DATABASE.punch, MOVE_DATABASE.kick, ...owned.filter(m=>equippedIds.includes(m.id))];
            } catch(e){ return [MOVE_DATABASE.punch, MOVE_DATABASE.kick]; }
        }

        // ========== FIGHTING GAME CLASS - ULTIMATE EDITION ==========
